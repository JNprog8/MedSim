services:
  stt-tts-api:
    build: .
    container_name: stt-tts-api
    ports:
      - "8000:8080"
    environment:
      - HF_TOKEN=${HF_TOKEN}
      - OLLAMA_URL=${OLLAMA_URL}
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    volumes:
      - ./models_cache:/app/models
      - ${HOME}/.cache/huggingface:/root/.cache/huggingface
    networks:
      - medsim_network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

networks:
  medsim_network:
    name: medsim_network
    driver: bridge
