<!DOCTYPE html>
<html class="light" lang="es">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>MedSim - Gestión de Pacientes</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0d9488",
                        "background-light": "#f8fafc",
                        "background-dark": "#0f172a",
                        "slate-custom": {
                            50: "#f8fafc",
                            100: "#f1f5f9",
                            200: "#e2e8f0",
                            300: "#cbd5e1",
                            400: "#94a3b8",
                            500: "#64748b",
                            600: "#475569",
                            700: "#334155",
                            800: "#1e293b",
                            900: "#0f172a",
                        }
                    },
                    fontFamily: {
                        "display": ["Public Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-custom-900 dark:text-slate-custom-100 antialiased">
<div class="flex h-screen overflow-hidden">
  <aside class="w-64 flex-shrink-0 bg-slate-custom-900 dark:bg-black text-white flex flex-col border-r border-slate-custom-800">
    <div class="p-6 flex items-center gap-3">
      <div>
        <h1 class="text-lg font-bold leading-none">MedSim</h1>
        <p class="text-xs text-slate-custom-400 mt-1 uppercase tracking-wider font-semibold">Evaluator</p>
      </div>
    </div>
    <nav class="flex-1 px-4 py-4 space-y-1">
      <a data-nav="dashboard" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-custom-400 hover:text-white hover:bg-slate-custom-800 transition-colors" href="/frontend/evaluator"><span class="material-symbols-outlined">dashboard</span><span class="text-sm font-medium">Dashboard</span></a>
      <a data-nav="patients" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-custom-400 hover:text-white hover:bg-slate-custom-800 transition-colors" href="/frontend/patients"><span class="material-symbols-outlined">group</span><span class="text-sm font-medium">Pacientes</span></a>
      <a data-nav="students" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-custom-400 hover:text-white hover:bg-slate-custom-800 transition-colors" href="/frontend/students"><span class="material-symbols-outlined">school</span><span class="text-sm font-medium">Alumnos</span></a>
    </nav>
    <div class="p-4 border-t border-slate-custom-800">
      <a href="/frontend/index" class="flex items-center gap-3 p-3 rounded-xl bg-slate-custom-800/50 hover:bg-slate-custom-700 transition-colors"><span class="material-symbols-outlined text-3xl text-slate-custom-200">logout</span><span class="text-sm font-semibold text-slate-custom-200">Salir</span></a>
    </div>
  </aside>
  <main class="flex-1 flex flex-col min-w-0 overflow-hidden">
    <header class="h-20 border-b border-slate-custom-200 dark:border-slate-custom-800 bg-white dark:bg-slate-custom-900 flex items-center justify-between px-8 shrink-0">
      <div class="flex items-center gap-4">
        <h2 class="text-3xl font-extrabold tracking-tight text-slate-custom-800 dark:text-white">Gestión de Pacientes</h2>
        <span class="bg-primary/10 text-primary px-2 py-0.5 rounded text-xs font-bold uppercase tracking-wide">Pacientes</span>
      </div>
      <div class="flex items-center gap-4">
        <div class="relative">
          <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-custom-400 text-lg">search</span>
          <input id="search-input" class="pl-10 pr-4 py-2 bg-slate-custom-100 dark:bg-slate-custom-800 border-none rounded-lg text-sm w-64 focus:ring-2 focus:ring-primary outline-none" placeholder="Buscar paciente..." type="text"/>
        </div>
        <button id="btn-new-patient" class="bg-primary hover:bg-teal-700 text-white px-4 py-2 rounded-lg font-bold text-sm flex items-center gap-2 transition-all shadow-md shadow-primary/10"><span class="material-symbols-outlined text-lg">add_circle</span><span>Nuevo Paciente</span></button>
      </div>
    </header>
    <div class="flex-1 overflow-auto p-8">
      <div class="bg-white dark:bg-slate-custom-900 rounded-xl border border-slate-custom-200 dark:border-slate-custom-800 shadow-sm overflow-hidden">
        <div class="overflow-x-auto">
          <table class="min-w-full text-left border-separate border-spacing-0">
            <thead>
              <tr class="bg-slate-custom-50 dark:bg-slate-custom-800/50 border-b border-slate-custom-200 dark:border-slate-custom-800">
                <th class="px-6 py-4 text-xs font-semibold text-slate-custom-500 uppercase tracking-wider">Nombre</th>
                <th class="px-6 py-4 text-xs font-semibold text-slate-custom-500 uppercase tracking-wider">Región</th>
                <th class="px-6 py-4 text-xs font-semibold text-slate-custom-500 uppercase tracking-wider">Motivo</th>
                <th class="px-6 py-4 text-xs font-semibold text-slate-custom-500 uppercase tracking-wider text-right">Acciones</th>
              </tr>
            </thead>
            <tbody id="patient-table-body" class="bg-white dark:bg-slate-custom-900">
              <tr class="hover:bg-slate-custom-50/50 dark:hover:bg-slate-custom-800/30 transition-colors"><td class="px-6 py-4 text-sm font-mono text-slate-custom-400" colspan="4">Cargando pacientes...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
</div>
<script>
(function () {
  const path = window.location.pathname;
  const mapping = {'/frontend/evaluator': 'dashboard','/evaluator': 'dashboard','/frontend/patients': 'patients','/patients': 'patients','/frontend/students': 'students','/students': 'students'};
  const key = mapping[path];
  if (key) {
    const item = document.querySelector(`[data-nav="${key}"]`);
    if (item) {
      item.classList.add('bg-primary', 'text-white', 'shadow-lg', 'shadow-primary/20');
      item.classList.remove('text-slate-custom-400', 'hover:text-white', 'hover:bg-slate-custom-800');
    }
  }
})();
</script>
<script src="/frontend-assets/patients.js"></script>
</body>
</html>
