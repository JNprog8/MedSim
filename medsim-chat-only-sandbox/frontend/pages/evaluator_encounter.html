<!DOCTYPE html>
<html class="light" lang="es">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>MedSim - Evaluación de Encuentro</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0d9488",
                        "background-light": "#f8fafc",
                        "background-dark": "#0f172a",
                        "slate-custom": {
                            50: "#f8fafc",
                            100: "#f1f5f9",
                            200: "#e2e8f0",
                            300: "#cbd5e1",
                            400: "#94a3b8",
                            500: "#64748b",
                            600: "#475569",
                            700: "#334155",
                            800: "#1e293b",
                            900: "#0f172a",
                        }
                    },
                    fontFamily: {
                        "display": ["Public Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-custom-900 dark:text-slate-custom-100 antialiased">
<div class="flex h-screen overflow-hidden">
  <main class="flex-1 flex flex-col min-w-0 overflow-hidden pt-24">
    <header class="fixed top-0 w-full z-50 bg-white/80 dark:bg-slate-900/80 backdrop-blur-xl shadow-[0_12px_32px_rgba(11,79,104,0.08)]">
      <div class="flex justify-between items-center px-6 py-4 max-w-7xl mx-auto relative">
        <div class="flex items-center gap-4">
          <button id="btn-back" class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors active:scale-95 duration-200 text-cyan-900 dark:text-cyan-100" type="button" aria-label="Volver">
            <span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
          </button>
          <h1 class="text-xl font-bold tracking-tight text-cyan-900 dark:text-cyan-100">MedSim</h1>
        </div>
        <div class="w-10 h-10"></div>
        <div class="bg-slate-100/50 dark:bg-slate-800/50 h-[1px] w-full absolute bottom-0 left-0"></div>
      </div>
    </header>
    <div class="flex-1 overflow-auto p-8">
      <div class="grid grid-cols-2 gap-6 h-full">
        <div class="bg-white dark:bg-slate-custom-900 rounded-xl border border-slate-custom-200 dark:border-slate-custom-800 shadow-sm overflow-hidden flex flex-col">
          <div class="px-6 py-4 border-b border-slate-custom-200 dark:border-slate-custom-800 flex items-center justify-between">
            <div>
              <h3 class="text-lg font-semibold text-slate-custom-900 dark:text-white">Conversación</h3>
              <p class="text-xs text-slate-custom-500 mt-1" id="status">Estado: Cargando...</p>
            </div>
            <div class="flex items-center gap-2">
              <button id="btn-open-student" class="px-3 py-1.5 text-xs font-semibold text-slate-custom-700 dark:text-slate-custom-200 border border-slate-custom-200 dark:border-slate-custom-700 rounded-lg hover:bg-slate-custom-50 dark:hover:bg-slate-custom-800 transition-colors"><span class="flex items-center gap-1.5"><span class="material-symbols-outlined text-sm">open_in_new</span><span>Abrir link</span></span></button>
              <button id="btn-activate" class="px-3 py-1.5 text-xs font-semibold text-white bg-primary hover:bg-teal-700 rounded-lg transition-colors"><span class="flex items-center gap-1.5"><span class="material-symbols-outlined text-sm">play_circle</span><span>Activar</span></span></button>
              <button id="btn-finish" class="px-3 py-1.5 text-xs font-semibold text-white bg-red-600 hover:bg-red-700 rounded-lg transition-colors disabled:opacity-50 disabled:cursor-not-allowed" disabled><span class="flex items-center gap-1.5"><span class="material-symbols-outlined text-sm">stop_circle</span><span>Finalizar</span></span></button>
            </div>
          </div>
          <div id="transcript" class="flex-1 overflow-auto p-4 bg-slate-custom-50 dark:bg-slate-custom-800/30"></div>
        </div>
        <div class="bg-white dark:bg-slate-custom-900 rounded-xl border border-slate-custom-200 dark:border-slate-custom-800 shadow-sm overflow-hidden flex flex-col">
          <div class="px-6 py-4 border-b border-slate-custom-200 dark:border-slate-custom-800">
            <h3 class="text-lg font-semibold text-slate-custom-900 dark:text-white">Plantilla SEGUE</h3>
            <p class="text-xs text-slate-custom-500 mt-1">Si(1) / No(0) / NC + Observaciones</p>
          </div>
          <div class="flex-1 overflow-auto p-6">
            <div id="segue-table-wrap" class="text-sm text-slate-custom-500">Cargando planilla...</div>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>
<script src="/frontend-assets/evaluator_encounter.js"></script>
</body>
</html>
