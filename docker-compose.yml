services:
  app:
    build: .
    container_name: medsim-app
    restart: always
    ports:
      - "8000:8080"
    env_file:
      - .env
    environment:
      - MONGO_URL=mongodb://admin:secret@mongo:27017/medsim?authSource=admin
      - OLLAMA_URL=${OLLAMA_URL:-http://host.docker.internal:11434}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - medsim_net

  mongo:
    image: mongo:latest
    container_name: medsim-mongo
    restart: always
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=secret
    volumes:
      - mongo_data:/data/db
    networks:
      - medsim_net
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 40s

volumes:
  mongo_data:

networks:
  medsim_net:
    driver: bridge
